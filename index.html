<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clase Gratuita — Escuela de Influencers IA</title>
<meta name="description" content="Descubre cómo creamos modelos de IA que se viralizan en Instagram y TikTok, y cómo convertir esa atención en ingresos.">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #E8001A;
    --red2: #FF1F38;
    --bg: #080808;
    --text: #F5F4EF;
    --muted: #999;
    --border: rgba(255,255,255,0.07);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
    position: relative;
    overflow-x: hidden;
    background-image: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(232,0,26,0.14) 0%, transparent 65%);
  }

  /* GLOW BELOW (fijo al viewport, sin cortes) */
  .glow-bottom {
    position: fixed; bottom: -45vh; left: 50%; transform: translateX(-50%);
    width: 160vw; height: 90vh;
    background: radial-gradient(ellipse 50% 50% at 50% 50%, rgba(232,0,26,0.32) 0%, rgba(232,0,26,0.10) 45%, transparent 72%);
    pointer-events: none; z-index: 0;
  }

  /* LINEA ROJA CURVA (estilo referencia) */
  .red-arc {
    position: relative; width: 100vw; height: 0;
    pointer-events: none; z-index: 0;
  }
  .red-arc svg {
    position: absolute; top: -90px; left: 50%; transform: translateX(-50%);
    width: 100vw; height: 260px; display: block;
  }

  .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; }


  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(232,0,26,0.1); border: 1px solid rgba(232,0,26,0.3);
    color: var(--red2); font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; padding: 6px 16px; border-radius: 99px;
    margin-bottom: 28px; animation: fadeUp 0.6s ease both;
  }
  .badge-dot { width: 6px; height: 6px; background: var(--red2); border-radius: 50%; animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }

  h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: clamp(34px, 5.5vw, 64px);
    line-height: 1.12; letter-spacing: -1px; margin-bottom: 20px;
    max-width: 900px;
    animation: fadeUp 0.7s 0.1s ease both;
  }
  h1 em { font-style: normal; color: #FF3B30; }

  .subtitle {
    font-family: 'Poppins', sans-serif;
    font-size: clamp(15px, 2vw, 19px); color: #E8E7E2; max-width: 680px;
    line-height: 1.65; margin: 0 auto 36px; font-weight: 300;
    animation: fadeUp 0.7s 0.2s ease both;
  }

  @media (max-width: 640px) {
    body { padding: 16px 16px; padding-top: 8px; justify-content: flex-start; }
    .sub-br { display: none; }
    .badge { margin-bottom: 12px; }
    h1 { padding: 0 8px; margin-bottom: 12px; }
    .subtitle { padding: 0 12px; margin-bottom: 0; }
    .video-stage { margin-bottom: 18px; }
  }

  /* ===== VIDEO + CARRUSEL LATERAL DE FONDO ===== */
  .video-stage {
    position: relative;
    width: 100%;
    max-width: 1280px;
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeUp 0.7s 0.25s ease both;
  }

  /* Carril unico horizontal, infinito, que pasa por detras del video */
  .carousel-rail {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100vw;
    max-width: 1600px;
    height: 200px;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
    mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.9) 90%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.9) 10%, rgba(0,0,0,0.9) 90%, transparent 100%);
  }

  .carousel-track {
    display: flex;
    flex-direction: row;
    gap: 20px;
    width: max-content;
    animation: scrollHorizontal 30s linear infinite;
  }

  .carousel-track img {
    width: 200px;
    height: 200px;
    object-fit: cover;
    border-radius: 16px;
    opacity: 0.35;
    filter: grayscale(20%);
    flex-shrink: 0;
  }

  @keyframes scrollHorizontal {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .video-wrap {
    position: relative;
    width: 100%;
    max-width: 800px;
    border-radius: 14px; overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 30px 80px rgba(232,0,26,0.12), 0 30px 80px rgba(0,0,0,0.6);
    z-index: 1;
  }
  .video-wrap iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }

  @media (max-width: 900px) {
    .carousel-rail { height: 110px; }
    .carousel-track img { width: 100px; height: 100px; }
  }

  @media (max-width: 640px) {
    .carousel-rail { display: none; }
  }

  /* Carrusel visible en movil: capa de fondo difuminada detras del subtitulo */
  .mobile-carousel {
    display: none;
    position: relative;
    width: 100vw;
    margin-left: -16px;
    height: 130px;
    margin-top: -110px;
    margin-bottom: 10px;
    overflow: hidden;
    z-index: 0;
    mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.9) 6%, rgba(0,0,0,0.9) 94%, transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.9) 6%, rgba(0,0,0,0.9) 94%, transparent 100%);
  }
  .mobile-carousel .carousel-track {
    gap: 12px;
    animation: scrollHorizontal 24s linear infinite;
  }
  .mobile-carousel .carousel-track img {
    width: 120px;
    height: 120px;
    border-radius: 14px;
    opacity: 0.35;
    filter: grayscale(20%);
  }

  @media (max-width: 640px) {
    .mobile-carousel { display: block; }
    .subtitle { position: relative; z-index: 1; }
    .video-stage { position: relative; z-index: 1; }
  }

  .cta-wrap { display: flex; flex-direction: column; align-items: center; gap: 14px; animation: fadeUp 0.7s 0.35s ease both; }

  .btn-main {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--red); color: #fff;
    font-family: 'Poppins', sans-serif; font-size: 19px; font-weight: 500;
    padding: 22px 52px; border-radius: 99px; text-decoration: none;
    letter-spacing: 0; transition: all 0.2s; border: none; cursor: pointer;
    position: relative;
    box-shadow: 0 20px 60px rgba(232,0,26,0.45), 0 0 40px rgba(232,0,26,0.25);
  }
  .btn-main:hover { background: var(--red2); transform: translateY(-2px); box-shadow: 0 24px 70px rgba(232,0,26,0.55), 0 0 50px rgba(232,0,26,0.35); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* BOTON FLOTANTE WHATSAPP */
  .whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 52px;
    height: 52px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }
  .whatsapp-btn:hover { transform: scale(1.08); }
  .whatsapp-btn svg { width: 28px; height: 28px; fill: #fff; }
</style>
</head>
